name: Staging Tests

on:
  push:
    branches:
      - staging
  pull_request:
    branches:
      - staging

jobs:
  backend-tests:
    name: Backend Go Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Run Go tests
        run: go test -v -race ./...

      - name: Build backend
        run: go build ./...

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests (type-check + build)
        run: npm test

  mobile-app-tests:
    name: Mobile App Flutter Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile_app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Regenerate Android platform files
        run: flutter create --platforms=android .

      - name: Run Flutter tests
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release
